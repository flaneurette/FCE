<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fabrik Code Editor (FCE)</title>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<style>
body {
    margin: 0;
    font-family: 'Courier New', monospace;
    background-color: #eee;
    color: #333;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
}

.menubar {
    background-color: #ddd;
    padding: 8px 8px;
    font-family: Arial;
    font-size: 12px;
    display: flex;
    align-items: center;
    gap: 3px;
    flex-shrink: 0;
}

.menubar button, .menubar input {
    padding: 6px 8px;
    font-family: Arial;
    font-size: 12px;
    border: 1px solid #333;
    border-radius: 3px;
    background-color: #666;
    color: #fff;
    outline: none;
}

.menubar button:hover {
    background-color: green;
    color: #fff;
}

.menubar button:active {
    background-color: #d8d8d8;
}

.tab-bar {
    background-color: #ddd;
    border-bottom: 1px solid #eee;
    display: flex;
    overflow-x: auto;
    flex-shrink: 0;
    font-family: Arial;
    font-size: 12px;
    padding-top: 5px;
}

.tab {
    padding: 5px 10px;
    background-color: #fff;
    border: 3px outset #eee;
    border-bottom: none;
    border-radius: 5px 5px 0px 0px;
    margin-right: 2px;
    cursor: pointer;
    white-space: nowrap;
    font-family: Arial;
    font-size: 12px;
    border-left: 2px outset #eee;
    border-top: 2px outset #eee;
    border-right: 2px outset #eee;
    position: relative;
}

.tab.active {
    background-color: #f0f0f0;
    border-left: 2px outset #eee;
    border-top: 2px outset #eee;
    border-right: 2px outset #eee;
}

.tab:hover {
    background-color: #e0e0e0;
}

.editor-container {
    flex-grow: 1;
    display: flex;
    overflow: hidden;
    padding:10px;
    width: 100%;
}

#tabs {
    flex-grow: 1;
    display: flex;
    overflow: hidden;
    padding:0px;
    width: 100%;
}

.tab-content {
    display: none;
    flex-grow: 1;
    position: relative;
    overflow: hidden;
    width:100%;
}

.tab-content.active {
    display: flex;
    width:100%;
}

.line-numbers {
    background-color: #f5f5f5;
    border-right: 1px solid #ccc;
    padding: 15px 15px;
    text-align: right;
    color: #666;
    overflow-y: hidden;
    font-family: 'Courier New', monospace;
    white-space: pre;
    line-height: 1.5;
    font-size: 13px;
    flex-shrink: 0;
}

.code-area {
    flex-grow: 1;
    border: none;
    outline: none;
    padding: 15px;
    font-family: 'Courier New', monospace;
    resize: none;
    overflow: auto;
    background-color: white;
    line-height: 1.5;
    tab-size: 4;
    font-size: 13px;
    border: 2px inset #eee;
}

.modal {
    display: none;
    position: fixed;
    z-index: 100;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0,0,0,0.4);
    font-family: Arial;
    font-size: 12px;
}

.modal-content {
    background-color: #fefefe;
    margin: 15% auto;
    padding: 20px;
    border: 1px solid #666;
    width: 80%;
    max-width: 500px;
    border-radius: 5px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
}

.close {
    color: #aaa;
    float: right;
    font-size: 28px;
    font-weight: bold;
    cursor: pointer;
}

.close:hover {
    color: black;
}

.setting-item {
    margin: 10px 0;
    display: flex;
    align-items: center;
    gap: 10px;
}

.setting-item label {
    min-width: 100px;
}

#save-modal input {
    width: 100%;
    padding: 8px;
    margin: 10px 0;
    font-family: Arial;
    font-size: 12px;
    box-sizing: border-box;
}

#save-modal button {
    padding: 8px 15px;
    background-color: #4CAF50;
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-family: Arial;
}

#save-modal button:hover {
    background-color: #45a049;
}

.search-container {
    display: flex;
    align-items: center;
    gap: 5px;
}

.search-container input {
    padding: 5px 5px;
    font-family: Arial font-size: 13px;
    width: 150px;
    border: 2px inset #ddd;
    border-radius: 3px #ddd;
    background-color: #fff;
    color: #000;
}

.search-container button {
    padding: 6px 8px;
    font-family: Arial;
    font-size: 13px;
    cursor: pointer;
    color: #888;
    background-color: #eee;
    border: 1px solid #ccc;
    border-radius: 3px;
}

.search-container button:hover {
    background-color: green;
}

.search-not-found {
    color: red;
    font-size: 12px;
    font-family: 'Courier New', monospace;
    margin-left: 4px;
}

#settings-btn {
    padding: 6px 8px;
    font-family: Arial;
    font-size: 13px;
    cursor: pointer;
    color: #888;
    background-color: #eee;
    border: 1px solid #ccc;
    border-radius: 3px;
}

#preview-btn {
    padding: 0px;
    font-family: Arial;
    font-size: 21px;
    cursor: pointer;
    color: #fff;
    background-color: #ddd;
    border: 0px solid #ddd;
    border-radius: 0px;
    margin-top: -3px;
    display:none;
}

#preview-btn:hover {
    background-color: #ddd;
}

#splitter {
    width:15px;
    background-color: #999;
    border-radius: 5px;
    margin:5px;
    cursor: col-resize;
}

.context-menu {
    display: none;
    position: absolute;
    background-color: #f9f9f9;
    border: 1px solid #ddd;
    box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
    z-index: 1000;
    min-width: 120px;
    font-family: Arial;
    font-size: 12px;
}

.context-menu div {
    padding: 8px 12px;
    cursor: pointer;
}

.context-menu div:hover {
    background-color: #e0e0e0;
}

.rename-modal input {
    width: 100%;
    padding: 8px;
    margin: 10px 0;
    font-family: Arial;
    font-size: 12px;
    box-sizing: border-box;
}

.rename-modal button {
    padding: 8px 15px;
    background-color: #4CAF50;
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-family: Arial;
    margin-right: 10px;
}

.rename-modal button:hover {
    background-color: #45a049;
}

.new-file-modal input {
    width: 100%;
    padding: 8px;
    margin: 10px 0;
    font-family: Arial;
    font-size: 12px;
    box-sizing: border-box;
}

.new-file-modal button {
    padding: 8px 15px;
    background-color: #4CAF50;
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-family: Arial;
    margin-right: 10px;
}

.new-file-modal button:hover {
    background-color: #45a049;
}

</style>

</head>
<body>
    <div class="menubar">
        <button id="new-tab-btn" title="New Tab (Ctrl+T)">New Tab</button>
        <button id="open-btn" title="Open File (Ctrl+O)">Open</button>
        <button id="save-btn" title="Save File (Ctrl+S)">Save</button>
        <button id="rename-btn" title="Rename File">Rename</button>
        <div class="search-container">
            <input type="text" id="search-input" placeholder="Search...">
            <button id="search-btn" title="Search (Enter)">Find</button>
            <input type="text" id="regexp-search-input" placeholder="Regex...">
            <button id="regexp-search-btn" title="Regex Search (Enter)">Find</button>
            <span class="search-not-found" id="search-status"></span>
        </div>
        <button id="settings-btn">Settings</button>
        <button id="preview-btn" title="Preview html/javascript">&#9654;&#65039;</button>
    </div>

    <div class="tab-bar" id="tab-bar">
        <div class="tab active" data-tab-id="tab-1">untitled-1.txt</div>
    </div>

    <div class="editor-container">
        <div id="tabs">
        <div class="tab-content active" data-tab-id="tab-1">
            <div class="line-numbers" id="line-numbers-1"></div>
            <textarea class="code-area" id="code-1" spellcheck="false" wrap="off"></textarea>
        </div>
        </div>
        <div id="splitter"></div>
        <iframe id="preview-frame" sandbox="allow-scripts allow-same-origin" style=" width: 100%; height: 100%; border: 0px solid #ccc;" srcdoc="<!DOCTYPE html><html><body></body></html>"></iframe>
    </div>

    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Settings</h2>
            <div class="setting-item">
                <label for="font-size">Font Size:</label>
                <input type="range" id="font-size" min="10" max="24" value="14">
                <span id="font-size-value">14px</span>
            </div>
        </div>
    </div>

    <div id="rename-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Rename File</h2>
            <div class="rename-modal">
                <input type="text" id="new-filename" placeholder="Enter new filename (e.g., myfile.html)">
                <div>
                    <button id="confirm-rename">Rename</button>
                    <button id="cancel-rename">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <div id="new-file-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>New File</h2>
            <div class="new-file-modal">
                <input type="text" id="file-name-input" placeholder="Enter filename (e.g., myfile.html)">
                <div>
                    <button id="confirm-new-file">Create</button>
                    <button id="cancel-new-file">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <div id="context-menu" class="context-menu">
        <div id="rename-tab">Rename</div>
    </div>

<script>

document.addEventListener('DOMContentLoaded', function() {

    const tabBar = document.getElementById('tab-bar');
    const editorContainer = document.querySelector('.editor-container');
    let activeTabId = 'tab-1';
    let tabCount = 1;
    let currentSearchIndex = 0;
    let lastSearchTerm = '';
    let cursorPositions = [];
    let fileHandles = {}; // Track file handles per tab
    let tabFocus = [];

    // Initialize first tab
    document.querySelector('.tab[data-tab-id="tab-1"]').addEventListener('click', () => switchTab('tab-1'));

    // Initialize first tab line numbers
    updateLineNumbers(activeTabId);
    syncScroll(document.getElementById('code-1'), document.getElementById('line-numbers-1'));

    // First tab textarea tab key support
    document.getElementById('code-1').addEventListener('keydown', handleTabKey);
    document.getElementById('code-1').addEventListener('keyup', handleKey);
    document.getElementById('code-1').addEventListener('input', () => updateLineNumbers('tab-1'));
    document.getElementById('splitter').addEventListener('mousedown', splitterMove);

    // Menu buttons
    document.getElementById('new-tab-btn').addEventListener('click', showNewFileModal);
    document.getElementById('open-btn').addEventListener('click', openFile);
    document.getElementById('save-btn').addEventListener('click', doSave);
    document.getElementById('rename-btn').addEventListener('click', showRenameModal);

    // Rename modal buttons
    document.getElementById('confirm-rename').addEventListener('click', renameFile);
    document.getElementById('cancel-rename').addEventListener('click', hideRenameModal);

    // New file modal buttons
    document.getElementById('confirm-new-file').addEventListener('click', createNewFile);
    document.getElementById('cancel-new-file').addEventListener('click', hideNewFileModal);

    // Context menu for tabs
    document.getElementById('rename-tab').addEventListener('click', showRenameModal);

    // Setup file opening
    function openFile() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '*';
        input.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            // Create a new tab for the opened file
            createNewTab(file.name);

            const reader = new FileReader();
            reader.onload = function(e) {
                getActiveCodeArea().value = e.target.result;
                updateLineNumbers(activeTabId);
                updateTabName(file.name);

                // Store the file handle if supported
                if ('showSaveFilePicker' in window) {
                    fileHandles[activeTabId] = file;
                }

                let ext = file.name.split('.');
                assignPreview(ext[1]);
            };
            reader.readAsText(file);
        });
        input.click();
    }

    // Enhanced save function
    async function doSave() {
        const content = getActiveCodeArea().value;
        let filename = document.querySelector(`.tab[data-tab-id="${activeTabId}"]`).textContent;
        let currentFileHandle = fileHandles[activeTabId];

        // Ensure filename has extension
        if (!filename.includes('.')) {
            filename += '.txt';
        }

        try {
            // If we already have a file handle (re-saving), skip the picker
            if (currentFileHandle && 'showSaveFilePicker' in window) {
                const writable = await currentFileHandle.createWritable();
                await writable.write(content);
                await writable.close();
            }
            // First save or fallback to picker
            else {
                if ('showSaveFilePicker' in window) {
                    currentFileHandle = await window.showSaveFilePicker({
                        suggestedName: filename,
                    });

                    const writable = await currentFileHandle.createWritable();
                    await writable.write(content);
                    await writable.close();

                    // Store the file handle
                    fileHandles[activeTabId] = currentFileHandle;
                } else {
                    // Firefox/Safari fallback
                    const blob = new Blob([content], { type: 'text/plain' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = filename;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                }
            }
            updateTabName(filename);
            let ext = filename.split('.');
            assignPreview(ext[ext.length - 1]);
        } catch (err) {
            if (err.name !== 'AbortError') {
                console.error("Save failed:", err);
                currentFileHandle = null;
            }
        }
    }

    // Rename functionality
    function showRenameModal() {
        const currentName = document.querySelector(`.tab[data-tab-id="${activeTabId}"]`).textContent;
        document.getElementById('new-filename').value = currentName;
        document.getElementById('rename-modal').style.display = 'block';
        document.getElementById('new-filename').focus();
    }

    function hideRenameModal() {
        document.getElementById('rename-modal').style.display = 'none';
    }

    function renameFile() {
        const newName = document.getElementById('new-filename').value.trim();
        if (!newName) return;

        // Validate filename
        if (!newName.includes('.')) {
            alert('Please include a file extension (e.g., .txt, .html)');
            return;
        }

        updateTabName(newName);
        hideRenameModal();

        // Update file handle name if it exists
        if (fileHandles[activeTabId]) {
            fileHandles[activeTabId].name = newName;
        }

        let ext = newName.split('.');
        assignPreview(ext[ext.length - 1]);
    }

    // New file functionality
    function showNewFileModal() {
        document.getElementById('file-name-input').value = '';
        document.getElementById('new-file-modal').style.display = 'block';
        document.getElementById('file-name-input').focus();
    }

    function hideNewFileModal() {
        document.getElementById('new-file-modal').style.display = 'none';
    }

    function createNewFile() {
        let filename = document.getElementById('file-name-input').value.trim();
        if (!filename) {
            alert('Please enter a filename');
            return;
        }

        // Validate filename
        if (!filename.includes('.')) {
            filename += '.txt';
        }

        hideNewFileModal();
        createNewTab(filename);
    }

    function createNewTab(name) {
        tabFocus[activeTabId] = false;

        tabCount++;
        const tabId = `tab-${tabCount}`;
        let tabs = document.getElementById(`tabs`);
        const tabElement = document.createElement('div');
        tabElement.className = 'tab';
        tabElement.textContent = name;
        tabElement.dataset.tabId = tabId;
        tabElement.addEventListener('click', () => switchTab(tabId));
        tabBar.appendChild(tabElement);

        const tabContent = document.createElement('div');
        tabContent.className = 'tab-content';
        tabContent.dataset.tabId = tabId;

        const lineNumbers = document.createElement('div');
        lineNumbers.className = 'line-numbers';
        lineNumbers.id = `line-numbers-${tabCount}`;

        const codeArea = document.createElement('textarea');
        codeArea.className = 'code-area';
        codeArea.id = `code-${tabCount}`;
        codeArea.spellcheck = false;
        codeArea.wrap = 'off';
        codeArea.addEventListener('input', () => updateLineNumbers(tabId));
        codeArea.addEventListener('keydown', handleTabKey);
        codeArea.addEventListener('keyup', handleKey);
        tabContent.appendChild(lineNumbers);
        tabContent.appendChild(codeArea);
        syncScroll(codeArea, lineNumbers);
        tabs.appendChild(tabContent);

        switchTab(tabId);
        setTimeout(() => codeArea.focus(), 0);

        tabFocus[tabId] = true;
    }

    // Context menu for tabs
    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            activeTabId = this.dataset.tabId;
            const contextMenu = document.getElementById('context-menu');

            // Position the context menu near the cursor
            contextMenu.style.display = 'block';
            contextMenu.style.left = e.pageX + 'px';
            contextMenu.style.top = e.pageY + 'px';
        });
    });

    // Close context menu when clicking elsewhere
    document.addEventListener('click', function() {
        document.getElementById('context-menu').style.display = 'none';
    });

    // Search functionality
    const searchInput = document.getElementById('search-input');
    const regexpInput = document.getElementById('regexp-search-input');
    const searchStatus = document.getElementById('search-status');

    function doSearch() {
        const codeArea = getActiveCodeArea();
        const term = searchInput.value;
        searchStatus.textContent = '';

        if (!term) return;

        if (term !== lastSearchTerm) {
            currentSearchIndex = 0;
            lastSearchTerm = term;
        }

        let index = codeArea.value.indexOf(term, currentSearchIndex);

        if (index === -1) {
            index = codeArea.value.indexOf(term, 0);
        }

        if (index !== -1) {
            codeArea.focus();
            codeArea.setSelectionRange(index, index + term.length);
            const linesBefore = codeArea.value.substring(0, index).split('\n').length;
            codeArea.scrollTop = (linesBefore - 3) * 19.5;
            currentSearchIndex = index + term.length;
        } else {
            searchStatus.textContent = 'Not found';
        }
    }

    function syncScroll(codeArea, lineNumbers) {
        codeArea.addEventListener('scroll', function() {
            lineNumbers.scrollTop = codeArea.scrollTop;
        });
    }

    function assignPreview(filetype) {
        if (['html', 'htm', 'thtml', 'xhtml', 'shtml', 'txt', 'md', 'markdown'].includes(filetype.toLowerCase())) {
            let previewBtn = document.getElementById('preview-btn');
            previewBtn.style.display = 'block';
            previewBtn.addEventListener('click', () => { previewCode(filetype); });
        }
        return;
    }

    function previewCode() {
        const codeArea = getActiveCodeArea();
        updatePreview(codeArea.value);
    }

    function updatePreview(code) {
        const previewFrame = document.getElementById('preview-frame');
        previewFrame.srcdoc = `${code}`;
    }

    function doRegexSearch() {
        const codeArea = getActiveCodeArea();
        const term = regexpInput.value;
        searchStatus.textContent = '';

        if (!term) return;

        try {
            const regex = new RegExp(term, 'g');
            regex.lastIndex = currentSearchIndex;
            let match = regex.exec(codeArea.value);

            if (!match) {
                regex.lastIndex = 0;
                match = regex.exec(codeArea.value);
            }

            if (match) {
                codeArea.focus();
                codeArea.setSelectionRange(match.index, match.index + match[0].length);
                const linesBefore = codeArea.value.substring(0, match.index).split('\n').length;
                codeArea.scrollTop = (linesBefore - 3) * 19.5;
                currentSearchIndex = match.index + match[0].length;
            } else {
                searchStatus.textContent = 'Not found';
            }
        } catch (e) {
            searchStatus.textContent = 'Bad regex';
        }
    }

    document.getElementById('search-btn').addEventListener('click', function(e) {
        e.stopPropagation();
        doSearch();
    });

    document.getElementById('regexp-search-btn').addEventListener('click', function(e) {
        e.stopPropagation();
        doRegexSearch();
    });

    searchInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            doSearch();
        }
    });

    regexpInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            doRegexSearch();
        }
    });

    searchInput.addEventListener('input', function() {
        if (!this.value) {
            currentSearchIndex = 0;
            lastSearchTerm = '';
            searchStatus.textContent = '';
        }
    });

    regexpInput.addEventListener('input', function() {
        if (!this.value) {
            currentSearchIndex = 0;
            searchStatus.textContent = '';
        }
    });

    // Settings modal
    const settingsModal = document.getElementById('settings-modal');
    document.getElementById('settings-btn').addEventListener('click', function() {
        settingsModal.style.display = 'block';
    });

    settingsModal.querySelector('.close').addEventListener('click', function() {
        settingsModal.style.display = 'none';
    });

    window.addEventListener('click', function(e) {
        if (e.target === settingsModal) settingsModal.style.display = 'none';
        if (e.target === document.getElementById('rename-modal')) hideRenameModal();
        if (e.target === document.getElementById('new-file-modal')) hideNewFileModal();
    });

    // Font size
    document.getElementById('font-size').addEventListener('input', function() {
        const fontSize = this.value + 'px';
        document.getElementById('font-size-value').textContent = fontSize;
        document.querySelectorAll('.code-area, .line-numbers').forEach(el => {
            el.style.fontSize = fontSize;
        });
    });

    // Keyboard shortcuts
    document.addEventListener('keydown', function(e) {
        if (e.ctrlKey) {
            switch(e.key) {
                case 'o': e.preventDefault(); document.getElementById('open-btn').click(); break;
                case 's': e.preventDefault(); doSave(); break;
                case 'f': e.preventDefault(); searchInput.focus(); searchInput.select(); break;
                case 't': e.preventDefault(); showNewFileModal(); break;
                case 'r': e.preventDefault(); showRenameModal(); break;
            }
        }
    });

    function switchTab(tabId) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelector(`.tab[data-tab-id="${tabId}"]`).classList.add('active');
        document.querySelector(`.tab-content[data-tab-id="${tabId}"]`).classList.add('active');
        activeTabId = tabId;
        currentSearchIndex = 0;
        lastSearchTerm = '';
        searchStatus.textContent = '';
        updateLineNumbers(tabId);
        tabFocus[activeTabId] = true;
        setTimeout(() => {
            restoreTabCursor(activeTabId);
            getActiveCodeArea().focus();
        }, 10);
    }

    function updateLineNumbers(tabId) {
        const tabNum = tabId.split('-')[1];
        const codeArea = document.getElementById(`code-${tabNum}`);
        const lineNumbers = document.getElementById(`line-numbers-${tabNum}`);
        if (!codeArea || !lineNumbers) return;
        const lines = codeArea.value.split('\n').length;
        let text = '';
        for (let i = 1; i <= lines; i++) text += i + '\n';
        lineNumbers.textContent = text;
    }

    function updateTabName(name) {
        document.querySelector(`.tab[data-tab-id="${activeTabId}"]`).textContent = name;
    }

    function getActiveCodeArea() {
        const tabNum = activeTabId.split('-')[1];
        return document.getElementById(`code-${tabNum}`);
    }

    function handleTabKey(e) {
        if (e.key === 'Tab') {
            e.preventDefault();
            const start = this.selectionStart;
            const end = this.selectionEnd;
            this.value = this.value.substring(0, start) + '    ' + this.value.substring(end);
            this.selectionStart = this.selectionEnd = start + 4;
            updateLineNumbers(activeTabId);
        }
    }

    function restoreTabCursor() {
        updateLineNumbers(activeTabId);
        let textarea = getActiveCodeArea();
        if(tabFocus[activeTabId] == true) {
            textarea.setSelectionRange(cursorPositions[activeTabId], cursorPositions[activeTabId]);
            tabFocus[activeTabId] = false;
        }
    }

    function storeTabCursor() {
        let textarea = getActiveCodeArea();
        const cursorPos = textarea.selectionStart;
        cursorPositions[activeTabId] = cursorPos;
    }

    function handleKey(e) {
        storeTabCursor();
    }

    // Splitter functionality
    let isDragging = false;
    let windowWidth = 0;

    function splitterDown(e) {
        isDragging = true;
        e.preventDefault();
    }

    function splitterMove(e) {
        if(windowWidth == 0) {
            windowWidth += window.innerWidth;
        }
        windowWidth += 400;
        document.getElementById('preview-frame').style.width = windowWidth + 'px';
    }

    function splitterUp() {
        isDragging = false;
    }

    document.getElementById('splitter').addEventListener('mousedown', splitterDown);
    document.addEventListener('mouseup', splitterUp);

});
</script>

</body>
</html>
